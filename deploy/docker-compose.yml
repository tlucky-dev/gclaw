version: '3.8'

services:
  gclaw:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: gclaw
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./config.json:/app/config.json:ro
      - gclaw_data:/app/data
      - gclaw_cache:/app/cache
      - gclaw_logs:/app/logs
    environment:
      - GCLAW_CONFIG=/app/config.json
      - GCLAW_DATA_DIR=/app/data
      - GCLAW_CACHE_DIR=/app/cache
      - GCLAW_LOG_DIR=/app/logs
      # Security settings
      - GCLAW_ENCRYPTION_KEY=${GCLAW_ENCRYPTION_KEY:-}
      - GCLAW_VAULT_PATH=/app/data/vault.enc
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - gclaw_network
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Optional: Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: gclaw_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - gclaw_network
    depends_on:
      - gclaw

  # Optional: Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: gclaw_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - gclaw_network
    depends_on:
      - prometheus

volumes:
  gclaw_data:
  gclaw_cache:
  gclaw_logs:
  prometheus_data:
  grafana_data:

networks:
  gclaw_network:
    driver: bridge
